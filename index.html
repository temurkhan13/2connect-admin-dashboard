<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Connect Admin - User Diagnostics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-healthy { background-color: #10b981; }
        .status-warning { background-color: #f59e0b; }
        .status-error { background-color: #ef4444; }
        .status-unknown { background-color: #6b7280; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-white">2Connect Admin Dashboard</h1>
            <p class="text-gray-400 mt-2">User Journey Diagnostics</p>
        </div>

        <!-- Search Box -->
        <div class="bg-gray-800 rounded-lg p-6 mb-6">
            <div class="flex gap-4">
                <input
                    type="email"
                    id="emailInput"
                    placeholder="Enter user email..."
                    class="flex-1 px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
                >
                <button
                    onclick="searchUser()"
                    class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors"
                >
                    Search
                </button>
            </div>
            <div id="searchStatus" class="mt-3 text-sm text-gray-400"></div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden">
            <!-- Summary Card -->
            <div id="summaryCard" class="bg-gray-800 rounded-lg p-6 mb-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 id="userName" class="text-xl font-semibold"></h2>
                        <p id="userEmail" class="text-gray-400"></p>
                        <p id="userId" class="text-gray-500 text-sm mt-1 font-mono"></p>
                    </div>
                    <div id="summaryBadge" class="px-4 py-2 rounded-full text-sm font-medium"></div>
                </div>
            </div>

            <!-- Status Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-gray-800 rounded-lg p-4">
                    <div class="flex items-center gap-2 mb-2">
                        <div id="accountStatus" class="w-3 h-3 rounded-full"></div>
                        <span class="text-gray-400 text-sm">Account</span>
                    </div>
                    <p id="accountDetail" class="text-white font-medium"></p>
                </div>
                <div class="bg-gray-800 rounded-lg p-4">
                    <div class="flex items-center gap-2 mb-2">
                        <div id="personaStatus" class="w-3 h-3 rounded-full"></div>
                        <span class="text-gray-400 text-sm">Persona</span>
                    </div>
                    <p id="personaDetail" class="text-white font-medium"></p>
                </div>
                <div class="bg-gray-800 rounded-lg p-4">
                    <div class="flex items-center gap-2 mb-2">
                        <div id="embeddingsStatus" class="w-3 h-3 rounded-full"></div>
                        <span class="text-gray-400 text-sm">Embeddings</span>
                    </div>
                    <p id="embeddingsDetail" class="text-white font-medium"></p>
                </div>
                <div class="bg-gray-800 rounded-lg p-4">
                    <div class="flex items-center gap-2 mb-2">
                        <div id="matchesStatus" class="w-3 h-3 rounded-full"></div>
                        <span class="text-gray-400 text-sm">Matches</span>
                    </div>
                    <p id="matchesDetail" class="text-white font-medium"></p>
                </div>
            </div>

            <!-- Issues -->
            <div id="issuesSection" class="bg-red-900/30 border border-red-800 rounded-lg p-4 mb-6 hidden">
                <h3 class="text-red-400 font-medium mb-2">Issues Detected</h3>
                <ul id="issuesList" class="text-red-300 text-sm space-y-1"></ul>
            </div>

            <!-- Actions -->
            <div id="actionsSection" class="bg-gray-800 rounded-lg p-6 mb-6">
                <h3 class="text-lg font-medium mb-4">Actions</h3>
                <div class="flex flex-wrap gap-3">
                    <button
                        onclick="regenerateEmbeddings()"
                        id="regenEmbeddingsBtn"
                        class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        Regenerate Embeddings
                    </button>
                    <button
                        onclick="regenerateMatches()"
                        id="regenMatchesBtn"
                        class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        Recalculate Matches
                    </button>
                </div>
                <div id="actionStatus" class="mt-3 text-sm"></div>
            </div>

            <!-- Timeline -->
            <div id="timelineSection" class="bg-gray-800 rounded-lg p-6 mb-6">
                <h3 class="text-lg font-medium mb-4">Timeline</h3>
                <div id="timeline" class="space-y-3"></div>
            </div>

            <!-- Raw Data -->
            <details class="bg-gray-800 rounded-lg">
                <summary class="p-4 cursor-pointer text-gray-400 hover:text-white">View Raw Response</summary>
                <pre id="rawData" class="p-4 text-xs text-gray-400 overflow-x-auto border-t border-gray-700"></pre>
            </details>
        </div>

        <!-- No Results -->
        <div id="noResults" class="hidden bg-gray-800 rounded-lg p-8 text-center">
            <p class="text-gray-400">No user found with that email</p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://twoconnectv1-ai.onrender.com/api/v1';
        const ADMIN_KEY = 'migrate-2connect-2026';
        let currentUserId = null;

        async function searchUser() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) return;

            document.getElementById('searchStatus').textContent = 'Searching...';
            document.getElementById('results').classList.add('hidden');
            document.getElementById('noResults').classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/admin/user-diagnostics?email=${encodeURIComponent(email)}`);
                const data = await response.json();

                if (data.code === 200 && data.result) {
                    displayResults(data.result);
                    document.getElementById('searchStatus').textContent = '';
                } else {
                    document.getElementById('noResults').classList.remove('hidden');
                    document.getElementById('searchStatus').textContent = 'User not found';
                }
            } catch (error) {
                document.getElementById('searchStatus').textContent = `Error: ${error.message}`;
            }
        }

        function displayResults(result) {
            document.getElementById('results').classList.remove('hidden');
            currentUserId = result.account?.details?.user_id;

            // Summary
            const name = result.account?.details?.name || 'Unknown';
            document.getElementById('userName').textContent = name || result.email;
            document.getElementById('userEmail').textContent = result.email;
            document.getElementById('userId').textContent = currentUserId ? `ID: ${currentUserId}` : '';

            // Summary badge
            const summaryBadge = document.getElementById('summaryBadge');
            const summaryMap = {
                'HEALTHY': { text: 'Healthy', class: 'bg-green-600' },
                'EMBEDDINGS_MISSING': { text: 'Embeddings Missing', class: 'bg-red-600' },
                'MATCHES_NOT_CALCULATED': { text: 'No Matches', class: 'bg-yellow-600' },
                'USER_NOT_FOUND': { text: 'Not Found', class: 'bg-gray-600' },
                'ISSUES_DETECTED': { text: 'Issues', class: 'bg-orange-600' }
            };
            const summary = summaryMap[result.summary] || { text: result.summary, class: 'bg-gray-600' };
            summaryBadge.textContent = summary.text;
            summaryBadge.className = `px-4 py-2 rounded-full text-sm font-medium ${summary.class}`;

            // Status indicators
            setStatus('account', result.account?.status === 'found' ? 'healthy' : 'error',
                result.account?.status === 'found' ? 'Found' : 'Not Found');

            setStatus('persona',
                result.persona?.status === 'completed' ? 'healthy' :
                result.persona?.status === 'not_found' ? 'error' : 'warning',
                result.persona?.details?.name || result.persona?.status || 'Not Generated');

            setStatus('embeddings',
                result.embeddings?.count > 0 ? 'healthy' : 'error',
                result.embeddings?.count > 0 ? `${result.embeddings.count} vectors` : 'Missing');

            setStatus('matches',
                result.matches?.count > 0 ? 'healthy' :
                result.embeddings?.count === 0 ? 'unknown' : 'warning',
                result.matches?.count > 0 ? `${result.matches.count} matches` : 'None');

            // Issues
            const issuesSection = document.getElementById('issuesSection');
            const issuesList = document.getElementById('issuesList');
            if (result.issues && result.issues.length > 0) {
                issuesSection.classList.remove('hidden');
                issuesList.innerHTML = result.issues.map(i => `<li>• ${i}</li>`).join('');
            } else {
                issuesSection.classList.add('hidden');
            }

            // Timeline
            const timeline = document.getElementById('timeline');
            if (result.timeline && result.timeline.length > 0) {
                timeline.innerHTML = result.timeline.map(t => `
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
                        <span class="text-gray-400 text-sm">${formatDate(t.timestamp)}</span>
                        <span class="text-white">${formatEvent(t.event)}</span>
                    </div>
                `).join('');
            } else {
                timeline.innerHTML = '<p class="text-gray-500">No timeline events</p>';
            }

            // Enable/disable action buttons
            document.getElementById('regenEmbeddingsBtn').disabled = !currentUserId;
            document.getElementById('regenMatchesBtn').disabled = !currentUserId || result.embeddings?.count === 0;

            // Raw data
            document.getElementById('rawData').textContent = JSON.stringify(result, null, 2);
        }

        function setStatus(id, status, text) {
            const statusEl = document.getElementById(`${id}Status`);
            const detailEl = document.getElementById(`${id}Detail`);

            statusEl.className = `w-3 h-3 rounded-full ${
                status === 'healthy' ? 'bg-green-500' :
                status === 'warning' ? 'bg-yellow-500' :
                status === 'error' ? 'bg-red-500' : 'bg-gray-500'
            }`;
            detailEl.textContent = text;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleString();
        }

        function formatEvent(event) {
            const eventMap = {
                'account_created': 'Account Created',
                'persona_generated': 'Persona Generated',
                'embeddings_created': 'Embeddings Created',
                'matches_calculated': 'Matches Calculated'
            };
            return eventMap[event] || event;
        }

        async function regenerateEmbeddings() {
            if (!currentUserId) return;

            const btn = document.getElementById('regenEmbeddingsBtn');
            const status = document.getElementById('actionStatus');

            btn.disabled = true;
            btn.textContent = 'Generating...';
            status.textContent = '';

            try {
                const response = await fetch(`${API_BASE}/admin/regenerate-embeddings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUserId, admin_key: ADMIN_KEY })
                });
                const data = await response.json();

                if (data.code === 200) {
                    status.innerHTML = '<span class="text-green-400">Embeddings generation triggered! Refresh in 30 seconds.</span>';
                } else {
                    status.innerHTML = `<span class="text-red-400">Error: ${data.message || data.detail}</span>`;
                }
            } catch (error) {
                status.innerHTML = `<span class="text-red-400">Error: ${error.message}</span>`;
            }

            btn.disabled = false;
            btn.textContent = 'Regenerate Embeddings';
        }

        async function regenerateMatches() {
            if (!currentUserId) return;

            const btn = document.getElementById('regenMatchesBtn');
            const status = document.getElementById('actionStatus');

            btn.disabled = true;
            btn.textContent = 'Calculating...';
            status.textContent = '';

            try {
                const response = await fetch(`${API_BASE}/admin/regenerate-matches`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUserId, admin_key: ADMIN_KEY })
                });
                const data = await response.json();

                if (data.code === 200) {
                    const matchCount = data.result?.count || 0;
                    status.innerHTML = `<span class="text-green-400">Matches recalculated! Found ${matchCount} matches. Refresh to see updated status.</span>`;
                } else {
                    status.innerHTML = `<span class="text-red-400">Error: ${data.message || data.detail}</span>`;
                }
            } catch (error) {
                status.innerHTML = `<span class="text-red-400">Error: ${error.message}</span>`;
            }

            btn.disabled = false;
            btn.textContent = 'Recalculate Matches';
        }

        // Enter key to search
        document.getElementById('emailInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchUser();
        });
    </script>
</body>
</html>
