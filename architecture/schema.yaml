# 2Connect Platform Architecture Schema
# Last Updated: 2026-03-28
# This file is the source of truth for the architecture dashboard
# Note: DynamoDB migrated to Supabase on 2026-03-09
# Note: Haiku→Sonnet upgrade in BUG-055, separated services in BUG-071

meta:
  name: 2Connect
  description: AI-powered professional networking platform
  version: "1.0"
  updated: "2026-03-28"

services:
  frontend:
    name: Frontend (React)
    repo: reciprocity-frontend
    url: https://2connectv1-frontend.vercel.app
    tech: React, TypeScript, Tailwind
    local_path: C:/Users/hp/reciprocity-frontend

  backend:
    name: Backend (NestJS)
    repo: reciprocity-backend
    url: https://twoconnectv1-backend.onrender.com/api/v1
    tech: NestJS, TypeScript, TypeORM
    local_path: C:/Users/hp/reciprocity-backend

  ai_service:
    name: AI Service (FastAPI)
    repo: reciprocity-ai
    url: https://twoconnectv1-ai.onrender.com/api/v1
    tech: FastAPI, Python, LangChain
    local_path: C:/Users/hp/reciprocity-ai

databases:
  supabase:
    name: Supabase (PostgreSQL)
    type: postgres
    used_by: [backend, ai_service]
    tables:
      - users
      - user_onboarding_answers
      - user_summaries
      - user_profiles  # Migrated from DynamoDB staging-user-profiles (2026-03-09)
      - user_match_cache  # Migrated from DynamoDB staging-user-matches (2026-03-09)
      - matches
      - match_feedback
      - notified_match_pairs  # Migrated from DynamoDB (2026-03-09)
      - ai_conversations
      - analytics_events
      - connection_interests
      - browse_history
      - user_embeddings
      - verification_codes  # Email verification codes
      - onboarding_sections  # Legacy onboarding (unused)
      - onboarding_questions  # Legacy onboarding (unused)

  redis:
    name: Redis (Upstash)
    type: redis
    used_by: [ai_service]
    purpose: "Session cache, rate limiting, deduplication"

external_services:
  stream_chat:
    name: Stream Chat
    type: messaging
    used_by: [backend]
    purpose: "Real-time user-to-user messaging"
    docs: https://getstream.io/chat/docs/

  s3:
    name: AWS S3
    type: storage
    used_by: [ai_service]
    purpose: "Resume file storage"
    bucket: "2connect-uploads"

  google_oauth:
    name: Google OAuth
    type: auth
    used_by: [backend]
    purpose: "Google sign-in authentication"

ai_models:
  claude_sonnet:
    name: Claude Sonnet 4.5
    model_id: claude-sonnet-4-5-20250929
    provider: Anthropic
    note: "Upgraded from Haiku in BUG-055 for better accuracy"
    used_for:
      - Slot extraction (ONLY extraction, BUG-071)
      - Question generation (separate service, BUG-071)
      - Persona generation
      - Match explanations
    locations:
      extraction: app/services/llm_slot_extractor.py
      question_gen: app/services/llm_question_generator.py

  openai_embeddings:
    name: text-embedding-3-small
    provider: OpenAI
    used_for:
      - Multi-vector embeddings (6 dimensions)
      - JOB_SEARCH embeddings (role_type, skills, compensation)
      - SERVICES embeddings (expertise, engagement, portfolio)
    location: app/services/embedding_service.py

sections:
  - id: login
    name: Login/Signup
    description: User authentication flow

  - id: onboarding
    name: Onboarding
    description: Conversational AI onboarding and slot extraction

  - id: matching
    name: Matching
    description: Hybrid multi-vector matching algorithm

  - id: dashboard
    name: Dashboard
    description: User dashboard, matches, discover
