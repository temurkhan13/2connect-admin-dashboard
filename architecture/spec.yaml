# 2Connect Platform Specifications
# Last Updated: 2026-03-13
# This is the SOURCE OF TRUTH - code MUST match this

onboarding:
  # CORE_SLOTS - Required for ALL users
  # CANONICAL location: app/services/llm_slot_extractor.py:992 (CORRECT)
  # BUG: app/routers/onboarding.py:970 has WRONG slots (missing requirements, offerings, geography)
  CORE_SLOTS:
    - primary_goal
    - requirements
    - offerings
    - user_type
    - industry_focus
    - stage_preference
    - geography

  # Completion threshold
  completion_progress: 100  # Must reach 100% to complete
  min_slots_for_completion: 7  # All CORE_SLOTS filled

  # Session config
  session_timeout_seconds: 3600  # 1 hour
  chat_timeout_ms: 60000  # 60s frontend timeout
  max_retries: 1  # Frontend retries on timeout
  deduplication_window_seconds: 5  # Prevent duplicate submissions

  # LLM Architecture (BUG-071 separated services, BUG-055 Sonnet upgrade)
  LLM_MODEL: claude-sonnet-4-5-20250929  # Upgraded from Haiku in BUG-055
  EXTRACTION_SERVICE: llm_slot_extractor.py  # ONLY extracts slots
  QUESTION_SERVICE: llm_question_generator.py  # ONLY generates questions
  MAX_SLOTS_PER_TURN: 3  # BUG-088 progressive disclosure
  PRIMARY_GOAL_MANDATORY: true  # BUG-090 must extract first

  # 10 Objective Types (BUG-074 added JOB_SEARCH, BUG-075 added SERVICES)
  OBJECTIVE_TYPES:
    - FUNDRAISING
    - INVESTING
    - HIRING
    - PARTNERSHIP
    - MENTORSHIP
    - COFOUNDER
    - PRODUCT_LAUNCH
    - NETWORKING
    - JOB_SEARCH  # BUG-074
    - SERVICES    # BUG-075

  # Adaptive slot groups (added based on primary_goal)
  INVESTOR_SLOTS:
    - check_size
    - portfolio_size
    - investment_thesis
    trigger: "Looking to Invest"

  FOUNDER_SLOTS:
    - company_stage
    - funding_need
    - team_size
    trigger: "Seeking Investment"

  COFOUNDER_SLOTS:
    - skills_have
    - skills_need
    - commitment_level
    - equity_expectations
    trigger: "Finding Co-founder"

  HIRING_SLOTS:
    - role_type
    - seniority_level
    - remote_preference
    - compensation_range
    trigger: "Hiring Talent"

  MENTOR_SLOTS:
    - mentorship_areas
    - experience_level
    - time_commitment
    trigger: "Seeking Mentor"

  ADVISOR_SLOTS:
    - advisory_areas
    - availability
    - compensation_expectation
    trigger: "Offering Advisory"

  # JOB_SEARCH objective (BUG-074) - for job seekers and candidates
  JOB_SEARCH_SLOTS:
    - role_type
    - seniority_level
    - remote_preference
    - compensation_range
    - skills_have
    trigger: "Find New Job" or user_type is "Job Seeker"
    note: "Renamed from JOB_SEEKER_SLOTS to match ObjectiveType.JOB_SEARCH"

  # SERVICES objective (BUG-075) - for consultants, freelancers, agencies
  SERVICES_SLOTS:
    - service_type
    - budget_range
    - expertise
    - engagement_style
    - portfolio_type
    trigger: "Offering Services" or user_type is "Service Provider"

  PARTNERSHIP_SLOTS:
    - partnership_type
    - company_size
    - collaboration_scope
    trigger: "Seeking Partnership" or "B2B Collaboration"

  RECRUITER_SLOTS:
    - roles_hiring
    - company_represented
    - hiring_timeline
    trigger: user_type is "Recruiter"

matching:
  # Threshold for creating a match
  # Code location: app/services/inline_matching_service.py:72
  SIMILARITY_THRESHOLD: 0.5  # Minimum score to create match
  STRONG_THRESHOLD: 0.7  # High-quality match tier
  WORTH_EXPLORING_THRESHOLD: 0.55  # Medium match tier

  # Multi-vector weights (must sum to 1.0)
  # 6 separate embeddings generated per user via OpenAI text-embedding-3-small
  # Code location: app/services/multi_vector_matcher.py
  EMBEDDING_WEIGHTS:
    industry: 0.25
    stage: 0.20
    primary_goal: 0.20
    geography: 0.15
    engagement: 0.10
    dealbreakers: 0.10

  # Scoring formula
  # Code location: app/services/inline_matching_service.py
  FORMULA: |
    FINAL = BASE_SCORE
          × (0.7 + 0.3 × intent_quality)
          × bidirectional_factor
          × (0.9 + 0.1 × activity_boost)
          × (0.95 + 0.05 × temporal_boost)

  # Intent complementarity scores
  INTENT_PAIRS:
    INVESTOR_FOUNDER: 1.0
    MENTOR_MENTEE: 1.0
    TALENT_SEEKING_OPPORTUNITY_SEEKING: 1.0
    RECRUITER_JOB_SEEKER: 1.0
    COFOUNDER_COFOUNDER: 0.8
    PARTNERSHIP_PARTNERSHIP: 0.85
    SAME_OBJECTIVE: 0.3  # e.g., INVESTOR_INVESTOR

  # Filters
  BLOCK_SAME_OBJECTIVE: true
  ENFORCE_DEALBREAKERS: true

  # Storage
  MAX_MATCHES_PER_USER: 50

feedback:
  # Embedding adjustment on feedback
  # Code location: app/services/feedback_embedding_adjuster.py
  BASE_RATE: 0.02  # 2% adjustment per feedback
  MAX_RATE: 0.10  # 10% cap to prevent overfit

  # Normalization
  NORMALIZE_AFTER_ADJUSTMENT: true

databases:
  # Supabase key tables (DynamoDB migrated 2026-03-09)
  SUPABASE_USERS_TABLE: users
  SUPABASE_PROFILES_TABLE: user_profiles  # Was: DynamoDB staging-user-profiles
  SUPABASE_MATCH_CACHE_TABLE: user_match_cache  # Was: DynamoDB staging-user-matches
  SUPABASE_EMBEDDINGS_TABLE: user_embeddings
  SUPABASE_MATCHES_TABLE: matches

  # Redis key prefixes
  REDIS_SESSION_PREFIX: "onboarding:session:"
  REDIS_DEDUP_PREFIX: "onboarding:dedup:"
